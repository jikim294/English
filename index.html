<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EBS Language Note</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --text-sub: #666666;
    --text-muted: #999999;
    --border: #111111;
    --border-light: #e0e0e0;
    --accent: #0033FF;
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  /* 모바일 스크롤 고정 마법의 CSS */
  html, body { 
    background: var(--bg); color: var(--text); 
    font-family: 'DM Mono', monospace; 
    min-height: 100dvh; 
    overscroll-behavior-y: none;
  }

  /* ── HEADER & NAV ── */
  header {
    padding: calc(2.5rem + var(--safe-top)) 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .chapter-selector {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--text); color: var(--bg);
    padding: 6px 12px; font-size: 11px; cursor: pointer; text-transform: uppercase;
  }

  /* ── BOTTOM SHEET (Chapter List) ── */
  #chapter-sheet {
    position: fixed; bottom: -100%; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    z-index: 200; transition: bottom 0.3s ease;
    padding: 2rem 1.5rem calc(2rem + var(--safe-bottom));
  }
  #chapter-sheet.open { bottom: 0; }
  .sheet-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 150; display: none;
  }
  .sheet-overlay.open { display: block; }
  .chapter-item {
    padding: 1rem 0; border-bottom: 1px solid var(--border-light);
    font-size: 16px; cursor: pointer; display: flex; justify-content: space-between;
  }

  /* ── TABS ── */
  .tabs-wrap { position: sticky; top: var(--safe-top); z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); }
  .tabs { display: flex; padding: 0 1.5rem; }
  .tab {
    padding: 16px 0; margin-right: 24px; font-size: 11px; border: none; background: none;
    text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  /* ── CONTENT AREA ── */
  main { padding: 2rem 1.5rem; max-width: 600px; margin: 0 auto; padding-bottom: calc(80px + var(--safe-bottom)); }
  .section { display: none; }
  .section.visible { display: block; }

  .card { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; }
  .label { font-size: 9px; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid var(--accent); display: inline-block; margin-bottom: 12px; }
  .row { padding: 1.25rem 0; border-bottom: 1px solid var(--border-light); }
  .speaker { font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .en { font-size: 17px; line-height: 1.5; margin-bottom: 6px; }
  .ko { font-size: 13px; color: var(--text-sub); font-family: 'Gowun Dodum'; }

  /* ── FOOTER (모바일 하단 빵꾸 방지) ── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 0 1.5rem calc(var(--safe-bottom));
    height: calc(56px + var(--safe-bottom));
    display: flex; align-items: center; justify-content: space-between; font-size: 11px;
  }
</style>
</head>
<body>

<header>
  <div class="chapter-selector" onclick="toggleSheet(true)">
    <span id="current-day-label">Day 25</span> ▾
  </div>
  <h1 id="main-title" style="margin-top:1rem; font-weight:400; font-size:22px;">Loading...</h1>
</header>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('script')">Script</button>
    <button class="tab" onclick="switchTab('vocab')">Vocab</button>
    <button class="tab" onclick="switchTab('quiz')">Quiz</button>
  </div>
</div>

<main id="app-content">
  <div id="sec-script" class="section visible"></div>
  <div id="sec-vocab" class="section"></div>
  <div id="sec-quiz" class="section"></div>
</main>

<div class="sheet-overlay" id="overlay" onclick="toggleSheet(false)"></div>
<div id="chapter-sheet">
  <div style="font-size:11px; color:var(--text-muted); margin-bottom:1.5rem; text-transform:uppercase;">Select Chapter</div>
  <div id="chapter-list"></div>
</div>

<footer>
  <span id="footer-day">DAY 25</span>
  <span style="color:var(--text-muted)">EBS Audio</span>
</footer>

<script>
// JSON 데이터 (Day 25 & Day 26)
const ALL_DATA = {
  "day25": {
    "day": 25,
    "title": "Depends on my mood.",
    "keypoint": "그때그때 기분에 따라 달라요.",
    "dialogue": [
      { "speaker": "Suji", "en": "Are you more into fiction or non-fiction?", "ko": "소설과 비소설 중에 뭘 더 좋아하세요?" },
      { "speaker": "Ken", "en": "Depends on my mood. You?", "ko": "그때그때 기분에 따라 달라요. 수지 씨는요?" },
      { "speaker": "Suji", "en": "Mostly fiction. I love getting lost in stories.", "ko": "대개는 소설이요. 전 이야기 속에 푹 빠지는 것을 아주 좋아하거든요." }
    ],
    "vocab": [
      { "word": "non-fiction", "ko": "비소설" },
      { "word": "depends on", "ko": "~에 달려 있다, ~에 따라 달라지다" }
    ],
    "quiz": [
      { "en": "Are you more into movies or TV shows?", "ko": "너는 영화와 TV 프로그램 중에 뭐가 더 좋아?" },
      { "en": "Depends on my schedule.", "ko": "그건 제 일정에 따라 달라져요." }
    ]
  },
  "day26": {
    "day": 26,
    "title": "The spicy ones.",
    "keypoint": "매운 거.",
    "dialogue": [
      { "speaker": "Kelly", "en": "What kind of chips do you want?", "ko": "어떤 칩스가 좋아?" },
      { "speaker": "Ben", "en": "The spicy ones. I think they're in the red bag.", "ko": "매운 거. 그거 빨간색 봉지에 들어 있는 것 같아." },
      { "speaker": "Kelly", "en": "There are three red ones. Which?", "ko": "빨간 게 세 봉지가 있는데. 어떤 거?" },
      { "speaker": "Ben", "en": "The one just behind the big blue bag of popcorn.", "ko": "저 큰 사이즈 파란색 팝콘 봉지 바로 뒤에 있는 거." },
      { "speaker": "Kelly", "en": "Got it. Hope they're as spicy as last time!", "ko": "알았어. 지난번만큼 매운맛이면 좋겠다!" }
    ],
    "vocab": [
      { "word": "what kind of", "ko": "어떤 종류의" },
      { "word": "spicy", "ko": "매운맛인" },
      { "word": "behind", "ko": "~의 뒤에" }
    ],
    "quiz": [
      { "en": "What kind of coffee do you want?", "ko": "어떤 커피를 원해요?" },
      { "en": "There are four blue ones.", "ko": "파란 것이 네 개 있어요." }
    ]
  }
};

let currentDay = "day25";

function init() {
  renderChapterList();
  loadDay('day25');
}

function loadDay(dayKey) {
  currentDay = dayKey;
  const data = ALL_DATA[dayKey];
  
  // 헤더 & 푸터 텍스트 변경
  document.getElementById('current-day-label').textContent = `Day ${data.day}`;
  document.getElementById('main-title').textContent = data.title;
  document.getElementById('footer-day').textContent = `DAY ${data.day}`;
  
  // 스크립트 렌더링
  document.getElementById('sec-script').innerHTML = `
    <div class="card">
      <div class="label">Point</div>
      <div style="font-size:20px;">${data.keypoint}</div>
    </div>
  ` + data.dialogue.map(d => `
    <div class="row">
      <div class="speaker">${d.speaker}</div>
      <div class="en">${d.en}</div>
      <div class="ko">${d.ko}</div>
    </div>
  `).join('');

  // 단어장 렌더링
  document.getElementById('sec-vocab').innerHTML = data.vocab.map(v => `
    <div class="row">
      <div class="en" style="color:var(--accent)">${v.word}</div>
      <div class="ko">${v.ko}</div>
    </div>
  `).join('');

  // 퀴즈(연습) 렌더링
  document.getElementById('sec-quiz').innerHTML = data.quiz.map((q, i) => `
    <div class="row">
      <div class="speaker">Q${i+1}</div>
      <div class="ko" style="font-size:15px; color:var(--text); margin-bottom:8px;">${q.ko}</div>
      <div class="en" style="font-size:14px; color:var(--accent);">${q.en}</div>
    </div>
  `).join('');

  toggleSheet(false); // 바텀 시트 닫기
}

function toggleSheet(show) {
  document.getElementById('chapter-sheet').classList.toggle('open', show);
  document.getElementById('overlay').classList.toggle('open', show);
}

function renderChapterList() {
  const list = document.getElementById('chapter-list');
  list.innerHTML = Object.keys(ALL_DATA).map(key => `
    <div class="chapter-item" onclick="loadDay('${key}')">
      <span>Day ${ALL_DATA[key].day}</span>
      <span style="font-size:11px; color:var(--text-muted);">${ALL_DATA[key].title}</span>
    </div>
  `).join('');
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('sec-' + id).classList.add('visible');
}

init();
</script>
</body>
</html>
