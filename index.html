<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>EBS Audio Series · Boarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --text-sub: #666666;
    --text-muted: #999999;
    --border: #111111; 
    --border-light: #e0e0e0;
    --accent: #0033FF; 
    --accent-light: #f0f4ff;
    --red: #ff3333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh; 
    overscroll-behavior-y: none; 
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
  }

  /* ── INTRO PAGE STYLE ── */
  #intro-page {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 2000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
  }

  #intro-page.hidden {
    transform: translateY(-100%);
  }

  .intro-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .ticket-container {
    perspective: 1000px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    width: 100%;
    max-width: 340px;
  }

  .ticket {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1.5rem;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ticket:hover {
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  }

  /* 티켓 절취선 디자인 */
  .ticket::before, .ticket::after {
    content: '';
    position: absolute;
    right: 80px;
    width: 20px;
    height: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 50%;
    z-index: 2;
  }
  .ticket::before { top: -11px; }
  .ticket::after { bottom: -11px; }

  .ticket-line {
    position: absolute;
    right: 89px;
    top: 0;
    bottom: 0;
    border-right: 1px dashed var(--border-light);
  }

  .ticket-day {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .ticket-title {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.4;
    word-break: keep-all;
  }

  .ticket-title em {
    display: block;
    font-style: normal;
    font-size: 13px;
    color: var(--text-sub);
    font-family: 'Gowun Dodum', sans-serif;
    margin-top: 4px;
  }

  .ticket-footer {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── MAIN UI (HIDDEN INITIALLY) ── */
  #main-ui {
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #main-ui.visible {
    opacity: 1;
  }

  /* ── EXISTING STYLES ── */
  header { padding: 2.5rem 1.5rem 1.5rem; border-bottom: 1px solid var(--border); }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.1em; color: var(--text-sub); text-transform: uppercase; margin-bottom: 12px; }
  .header-main { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .header-day-select { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--bg); background: var(--text); padding: 4px 24px 4px 10px; border: none; text-transform: uppercase; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 4px center; background-size: 16px; cursor: pointer; }
  h1 { font-size: 20px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.4; color: var(--text); }
  h1 em { font-style: normal; color: var(--text-sub); font-size: 15px; font-family: 'Gowun Dodum', sans-serif; }
  .tabs-wrap { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); }
  .tabs { display: flex; padding: 0 1.5rem; overflow-x: auto; scrollbar-width: none; }
  .tab { padding: 16px 0; margin-right: 32px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  main { padding: 2rem 1.5rem; max-width: 600px; margin: 0 auto; }
  .section { display: none; }
  .section.visible { display: block; }
  .ko-line, .keypoint-ko { display: none; }
  .dialogue-card.show-ko .ko-line, .keypoint-box.show-ko .keypoint-ko { display: block; }
  .keypoint-box { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 2rem; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; background: var(--bg); }
  .keypoint-label { font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--accent); display: inline-block; padding-bottom: 4px; }
  .keypoint-en { font-size: 24px; color: var(--text); margin-bottom: 8px; }
  .keypoint-ko { font-size: 14px; color: var(--text-sub); font-family: 'Gowun Dodum', sans-serif; }
  .dialogue-card { display: flex; align-items: flex-start; gap: 16px; padding: 1.5rem 0; border-bottom: 1px solid var(--border-light); cursor: pointer; margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; }
  .speaker { font-size: 11px; color: var(--accent); text-transform: uppercase; }
  .speaker.sub-speaker { color: var(--text-muted); }
  .en-line { font-size: 16px; line-height: 1.6; }
  .en-line strong { font-weight: 500; text-decoration: underline; text-underline-offset: 4px; }
  .ko-line { font-size: 13px; color: var(--text-sub); margin-top: 8px; font-family: 'Gowun Dodum', sans-serif; }
  .tts-btn { flex-shrink: 0; font-size: 11px; padding: 4px 8px; border: 1px solid var(--border-light); color: var(--text-sub); text-transform: uppercase; }
  .vocab-row { display: flex; flex-direction: column; gap: 8px; padding: 1.5rem 0; border-bottom: 1px solid var(--border-light); }
  .vocab-word { font-size: 18px; color: var(--accent); }
  .vocab-ko { font-size: 14px; font-family: 'Gowun Dodum', sans-serif; }
  .quiz-meta { display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; margin-bottom: 12px; }
  .quiz-bar-bg { height: 1px; background: var(--border-light); margin-bottom: 2rem; position: relative; }
  .quiz-bar { position: absolute; top: -1px; left: 0; height: 3px; background: var(--text); transition: width 0.4s; }
  .quiz-prompt-box { border: 1px solid var(--border); padding: 2.5rem 1.5rem; text-align: center; margin-bottom: 16px; }
  .reveal-btn { width: 100%; padding: 16px; background: var(--text); color: var(--bg); border: none; font-family: 'DM Mono'; text-transform: uppercase; cursor: pointer; }
  .answer-box { display: none; border: 1px solid var(--accent); padding: 2rem 1.5rem; text-align: center; background: var(--accent-light); margin-bottom: 16px; }
  .answer-box.shown { display: block; }
  .answer-en { font-size: 20px; color: var(--accent); margin-bottom: 12px; }
  .judge-btns { display: none; gap: 12px; }
  .judge-btns.shown { display: flex; }
  .judge-btn { flex: 1; padding: 16px; border: 1px solid var(--border); background: var(--bg); font-family: 'DM Mono'; text-transform: uppercase; cursor: pointer; }
  .nyt-card { padding: 1.5rem 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
  .nyt-ko { font-size: 18px; font-family: 'Gowun Dodum', sans-serif; margin-bottom: 8px; }
  .nyt-answer { display: none; margin-top: 16px; padding: 16px; border: 1px solid var(--accent); color: var(--accent); }
  .nyt-answer.shown { display: block; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; gap: 20px; z-index: 100; }
  .bottom-label { font-size: 11px; color: var(--text); text-transform: uppercase; min-width: 50px; }
  .bottom-bar-track { flex: 1; height: 1px; background: var(--border-light); position: relative; }
  .bottom-bar-fill { position: absolute; top: -1px; left: 0; height: 3px; background: var(--accent); transition: width 0.3s; }
  body { padding-bottom: 70px; }
</style>
</head>
<body>

<div id="intro-page">
  <div class="intro-eyebrow">Select Your Journey</div>
  <div class="ticket-container" id="ticket-list">
    </div>
</div>

<div id="main-ui">
  <header>
    <div class="header-eyebrow">EBS Audio Series</div>
    <div class="header-main">
      <select class="header-day-select" id="day-selector" onchange="loadDay(this.value)">
        <option value="25">Day 25</option>
        <option value="23">Day 23</option>
      </select>
      <h1 id="main-title">Loading...</h1>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('script')">Script</button>
      <button class="tab" onclick="switchTab('vocab')">Vocab</button>
      <button class="tab" onclick="switchTab('quiz')">Quiz</button>
      <button class="tab" onclick="switchTab('talk')">Practice</button>
    </div>
  </div>

  <main>
    <div class="section visible" id="sec-script"></div>
    <div class="section" id="sec-vocab"><div id="vocab-list"></div></div>
    <div class="section" id="sec-quiz"><div id="quiz-area"></div></div>
    <div class="section" id="sec-talk">
      <div class="nyt-intro">한국어를 보고 영어로 말해보세요.</div>
      <div id="talk-list"></div>
    </div>
  </main>

  <div class="bottom-bar">
    <span class="bottom-label" id="bottom-label">Ready</span>
    <div class="bottom-bar-track">
      <div class="bottom-bar-fill" id="bottom-fill" style="width:0%"></div>
    </div>
    <span class="bottom-tag" id="bottom-tag">Script</span>
  </div>
</div>

<script>
// ── DATA: 기존 데이터 100% 보존 ──
const appData = {
  25: {
    titleEn: "Depends on my mood.", titleKo: "그때그때 기분에 따라 달라요",
    pointEn: "Depends on my mood.", pointKo: "그때그때 기분에 따라 달라요.",
    dialogue: [
      { speaker: 'Suji', enHtml: 'Are you more into <strong>fiction</strong> or <strong>non-fiction</strong>?', en: 'Are you more into fiction or non-fiction?', ko: '소설과 비소설 중에 뭘 더 좋아하세요?' },
      { speaker: 'Ken', isSub: true, enHtml: '<strong>Depends</strong> on my <strong>mood</strong>. You?', en: 'Depends on my mood. You?', ko: '그때그때 기분에 따라 달라요. 수지 씨는요?' },
      { speaker: 'Suji', enHtml: '<strong>Mostly fiction</strong>. I <strong>love getting lost</strong> in stories.', en: 'Mostly fiction. I love getting lost in stories.', ko: '대개는 소설이요. 전 이야기 속에 푹 빠지는 것을 아주 좋아하거든요.' },
      { speaker: 'Ken', isSub: true, enHtml: 'I like <strong>biographies</strong>. <strong>Real lives</strong> are fascinating.', en: 'I like biographies. Real lives are fascinating.', ko: '저는 전기들을 좋아해요. 실제 인생 이야기는 정말 대단하거든요.' },
      { speaker: 'Suji', enHtml: 'We should <strong>trade books</strong> sometime.', en: 'We should trade books sometime.', ko: '우리 언젠가 책을 바꿔 읽어 봐요.' }
    ],
    vocabData: [
      { word: 'non-fiction', ko: '비소설', exEn: '', exKo: '' },
      { word: 'depends on', ko: '~에 달려 있다, ~에 따라 달라지다', exEn: 'That depends on the weather that day.', exKo: '그건 그날의 날씨에 달려 있죠.' },
      { word: 'mood', ko: '분위기, 전반적인 기분', exEn: 'Is he in a good mood today?', exKo: '그분은 오늘 기분이 좋으신가요?' }
    ],
    nowYouTalkData: [
      { num: 1, ko: '너는 영화와 TV 프로그램 중에 뭐가 더 좋아?', hint: '(movies, TV shows)', en: 'Are you more into movies or TV shows?' },
      { num: 2, ko: '그건 제 일정에 따라 달라져요.', hint: '(my schedule)', en: 'Depends on my schedule.' }
    ]
  },
  23: {
    titleEn: "The spicy ones.", titleKo: "매운 거.",
    pointEn: "The spicy ones.", pointKo: "매운 거.",
    dialogue: [
      { speaker: 'Kelly', enHtml: 'What <strong>kind of</strong> chips do you want?', en: 'What kind of chips do you want?', ko: '어떤 칩스가 좋아?' },
      { speaker: 'Ben', isSub: true, enHtml: "The <strong>spicy</strong> ones. I think they're in the red bag.", en: "The spicy ones. I think they're in the red bag.", ko: '매운 거. 그거 빨간색 봉지에 들어 있는 것 같아.' }
    ],
    vocabData: [
      { word: 'what kind of', ko: '어떤 종류의', exEn: 'What kind of music do you enjoy?', exKo: '넌 어떤 음악을 즐겨 듣니?' },
      { word: 'spicy', ko: '매운맛인', exEn: 'This kimchi might be a little spicy for you.', exKo: '이 김치는 너에게 좀 매울 수 있어.' }
    ],
    nowYouTalkData: [
      { num: 1, ko: '어떤 커피를 원해요?', hint: '(coffee)', en: 'What kind of coffee do you want?' }
    ]
  }
};

let currentDay = '25';
let quizItems = [];

// ── INTRO & TICKET LOGIC ──────────────────────────────
function initIntro() {
  const container = document.getElementById('ticket-list');
  container.innerHTML = '';

  Object.keys(appData).reverse().forEach(day => {
    const data = appData[day];
    const ticket = document.createElement('div');
    ticket.className = 'ticket';
    ticket.innerHTML = `
      <div class="ticket-line"></div>
      <div class="ticket-day">Day ${day}</div>
      <div class="ticket-title">${data.titleEn} <em>${data.titleKo}</em></div>
      <div class="ticket-footer">
        <span>Audio Series</span>
        <span>${day % 2 === 0 ? 'TUE/THU' : 'MON/WED'}</span>
      </div>
    `;

    // 3D Tilt 인터랙션 추가
    ticket.addEventListener('mousemove', (e) => {
      const rect = ticket.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const rotateX = ((y / rect.height) - 0.5) * -15;
      const rotateY = ((x / rect.width) - 0.5) * 15;
      ticket.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });

    ticket.addEventListener('mouseleave', () => {
      ticket.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
    });

    ticket.addEventListener('click', () => {
      startApp(day);
    });

    container.appendChild(ticket);
  });
}

function startApp(day) {
  const intro = document.getElementById('intro-page');
  const main = document.getElementById('main-ui');
  
  loadDay(day);
  
  intro.classList.add('hidden');
  main.classList.add('visible');
}

// ── RENDER ENGINE (기존 로직 유지) ──────────────────────
function loadDay(day) {
  currentDay = day;
  const data = appData[day];

  document.getElementById('main-title').innerHTML = `${data.titleEn} <br><em>${data.titleKo}</em>`;
  document.getElementById('bottom-label').textContent = `Day ${day}`;
  document.getElementById('day-selector').value = day;

  const secScript = document.getElementById('sec-script');
  let scriptHtml = `
    <div class="keypoint-box" onclick="toggleKo(this)">
      <div class="keypoint-inner">
        <div class="keypoint-label">Point</div>
        <div class="keypoint-en">${data.pointEn}</div>
        <div class="keypoint-ko">${data.pointKo}</div>
      </div>
      <div class="keypoint-play" onclick="event.stopPropagation(); ttsSpeak('${data.pointEn.replace(/'/g, "\\'")}')">PLAY</div>
    </div>
    <div class="dialogue-intro">카드를 탭하면 해석이 열립니다. 음성은 PLAY 버튼을 눌러주세요.</div>
  `;

  data.dialogue.forEach((d, idx) => {
    scriptHtml += `
      <div class="dialogue-card" onclick="toggleKo(this)">
        <div class="speaker-col"><div class="speaker ${d.isSub ? 'sub-speaker' : ''}">${d.speaker}</div></div>
        <div class="dialogue-lines">
          <div class="en-line">${d.enHtml}</div>
          <div class="ko-line">${d.ko}</div>
        </div>
        <div class="tts-btn" id="tb-${idx}" onclick="event.stopPropagation(); ttsCard(${idx}, '${d.en.replace(/'/g, "\\'")}')">PLAY</div>
      </div>
    `;
  });
  secScript.innerHTML = scriptHtml;

  const vocabList = document.getElementById('vocab-list');
  vocabList.innerHTML = '';
  data.vocabData.forEach(v => {
    const row = document.createElement('div');
    row.className = 'vocab-row';
    row.innerHTML = `<div class="vocab-word">${v.word}</div><div class="vocab-ko">${v.ko}</div>`;
    vocabList.appendChild(row);
  });

  const talkList = document.getElementById('talk-list');
  talkList.innerHTML = '';
  data.nowYouTalkData.forEach(item => {
    const card = document.createElement('div');
    card.className = 'nyt-card';
    card.innerHTML = `
      <div class="nyt-top"><div class="nyt-num">NO.${String(item.num).padStart(2,'0')}</div></div>
      <div class="nyt-ko">${item.ko}</div>
      <div class="nyt-answer" id="nyt-ans-${item.num}"><div class="nyt-answer-en">${item.en}</div></div>
    `;
    card.addEventListener('click', () => document.getElementById('nyt-ans-' + item.num).classList.toggle('shown'));
    talkList.appendChild(card);
  });

  quizItems = data.dialogue.map(d => ({ speaker: d.speaker, en: d.en, ko: d.ko }));
  switchTab('script');
}

function toggleKo(el) { el.classList.toggle('show-ko'); }

// ── TTS & TAB LOGIC (기존과 동일) ──────────────────────
let currentTtsIdx = null;
function clearTtsUI() {
  document.querySelectorAll('.dialogue-card').forEach(c => c.classList.remove('playing'));
  document.querySelectorAll('.tts-btn').forEach(b => b.textContent = 'PLAY');
  currentTtsIdx = null;
}
function ttsSpeak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  clearTtsUI();
  window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
function ttsCard(idx, text) {
  if (!window.speechSynthesis) return;
  const btn = document.getElementById('tb-' + idx);
  const card = document.querySelectorAll('.dialogue-card')[idx];
  if (currentTtsIdx === idx) { window.speechSynthesis.cancel(); clearTtsUI(); return; }
  window.speechSynthesis.cancel(); clearTtsUI();
  currentTtsIdx = idx; card.classList.add('playing'); btn.textContent = 'STOP';
  const u = new SpeechSynthesisUtterance(text);
  u.onend = clearTtsUI;
  window.speechSynthesis.speak(u);
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('visible', s.id === 'sec-' + id));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── APP BOOT ──
initIntro();
</script>
</body>
</html>
